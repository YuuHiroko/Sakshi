<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A heartfelt webpage for Sakshi with messages, photos, and memories.">
  <meta property="og:title" content="Sakshi's Webpage 💖">
  <meta property="og:description" content="A heartfelt webpage dedicated to Sakshi, filled with messages, photos, and memories.">
  <meta property="og:image" content="sakshi-banner.webp">
  <title>Sakshi 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css" rel="stylesheet">
</head>
<body>
  <!-- Particles Background -->
  <div id="particles-js"></div>

  <!-- Dark Mode Toggle -->
  <div class="theme-toggle">
    <label>
      <input type="checkbox" id="theme-toggle-checkbox" aria-label="Enable dark mode">
      ☀ Light Mode
    </label>
  </div>

  <!-- Hero Header -->
  <header>
    <div class="hero">
      <h1 class="hero-title">Welcome to Sakshi's World 💖</h1>
      <p class="hero-subtitle">A space filled with love, memories, and happiness</p>
    </div>
  </header>

  <!-- Main Content -->
  <main id="main-content">
    <section id="about">
      <h2>About Sakshi 💖</h2>
      <p>Sakshi is my elder sissy who is the bestest sissy. She brings happiness wherever she goes!</p>
    </section>

    <section id="photos">
      <h2>Photo Gallery</h2>
      <div id="photo-gallery">
        <a href="travel1-large.webp" data-lightbox="gallery" data-title="Adventure at the mountains">
          <img src="travel1.webp" alt="Travel memory" loading="lazy">
        </a>
        <a href="family1-large.webp" data-lightbox="gallery" data-title="Family gathering moment">
          <img src="family1.webp" alt="Family memory" loading="lazy">
        </a>
        <a href="friends1-large.webp" data-lightbox="gallery" data-title="Fun day with friends">
          <img src="friends1.webp" alt="Friends memory" loading="lazy">
        </a>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-content">
      <p>Made with ❤️ by <a href="https://wa.me/+919175349176" target="_blank">Munchkin✨</a></p>
      <p>© 2025 Sakshi's Webpage. All rights reserved.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    // Particles configurations
    const particlesConfigLight = {
      particles: {
        number: { value: 80, density: { enable: true, value_area: 800 } },
        color: { value: "#ffffff" },
        line_linked: { enable: true, distance: 150, color: "#ffffff", opacity: 0.4, width: 1 },
        move: { enable: true, speed: 6 },
        size: { value: 3, random: true },
        opacity: { value: 0.5 }
      }
    };

    const particlesConfigDark = {
      particles: {
        number: { value: 80, density: { enable: true, value_area: 800 } },
        color: { value: "#aaaaaa" },
        line_linked: { enable: true, distance: 150, color: "#aaaaaa", opacity: 0.4, width: 1 },
        move: { enable: true, speed: 6 },
        size: { value: 3, random: true },
        opacity: { value: 0.5 }
      }
    };

    // Function to initialize particles based on the theme
    function initializeParticles(isDarkMode) {
      particlesJS('particles-js', isDarkMode ? particlesConfigDark : particlesConfigLight);
    }

    // Dark mode toggle functionality
    const themeToggleCheckbox = document.getElementById('theme-toggle-checkbox');

    function applyTheme(darkMode) {
      document.body.classList.toggle('dark-mode', darkMode);
      localStorage.setItem('darkMode', darkMode);
    }

    const isDarkMode = localStorage.getItem('darkMode') === 'true';
    themeToggleCheckbox.checked = isDarkMode;
    applyTheme(isDarkMode);
    initializeParticles(isDarkMode);

    themeToggleCheckbox.addEventListener('change', () => {
      const darkMode = themeToggleCheckbox.checked;
      applyTheme(darkMode);
      initializeParticles(darkMode);
    });
  </script>
</body>
</html>
