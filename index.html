<!DOCTYPE html>
<html>
<head>
  <title>For Sakshi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>For Sakshi</h1>
  </header>

  <main>
    <section id="message">
      <h2>A Special Message for You</h2>
      <p>[Write your heartfelt message here]</p>
    </section>

    <section id="photos">
      <h2>Memories We've Made</h2>
      <div id="photo-gallery">
        </div>
    </section>

    <section id="quotes">
      <h2>Quotes and Memories</h2>
      <div id="quote-container">
        </div>
    </section>

    <section id="friends">
      <h2>Messages from Your Friends</h2>
      <div id="friend-messages">
        </div>
    </section>

    <section id="music">
      <h2>Your Favorite Tune</h2>
      <div id="music-player">
        <iframe src="http://www.youtube.com/watch?v=sPHRoZFnEkU" title="Sai Pallavi's Intro (From 'Amaran')" frameborder="0"></iframe>
      </div>
    </section>

    <div id="hidden-message">
      <p>This is a hidden message!</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
